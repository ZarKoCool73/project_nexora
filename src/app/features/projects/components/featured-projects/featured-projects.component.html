<div
  class="featured-projects"
  *ngIf="projects.length">

  <!-- HEADER -->
  <div class="featured-header">

    <div>

      <div class="featured-kicker">
        Selección Destacada
      </div>

      <h3 class="featured-title">
        Proyectos Destacados
      </h3>

    </div>

    <div class="featured-right">

      <div class="featured-actions">

        <button
          class="featured-nav-btn"
          (click)="scrollLeft()">

          ←

        </button>

        <button
          class="featured-nav-btn"
          (click)="scrollRight()">

          →

        </button>

      </div>

    </div>

  </div>

  <!-- SLIDER -->
  <div class="featured-slider-wrapper">

    <!-- FADES -->
    <div class="featured-fade featured-fade-left"></div>
    <div class="featured-fade featured-fade-right"></div>

    <!-- TRACK -->
    <div
      class="featured-grid"
      #slider>

      @for (project of projects; track project.title) {

        <div class="featured-slide">

          <app-featured-project-card
            [project]="project">
          </app-featured-project-card>

        </div>

      }

    </div>

  </div>

</div>
