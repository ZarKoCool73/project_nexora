<div class="hero-projects">

  <!-- HEADER -->
  <div class="hero-header">

    <div>
      <div class="hero-kicker">
        Ingeniería Empresarial
      </div>

      <h3 class="hero-title">
        Proyectos de Alto Impacto
      </h3>
    </div>

    <div class="hero-actions">

      <button
        class="hero-nav-btn"
        (click)="scrollLeft()">

        ←

      </button>

      <button
        class="hero-nav-btn"
        (click)="scrollRight()">

        →

      </button>

    </div>

  </div>

  <p class="hero-description">
    Arquitecturas enterprise, procesamiento distribuido,
    sistemas financieros, integración AS400,
    Kafka, microservicios y modernización tecnológica.
  </p>

  <!-- WRAPPER -->
  <div class="hero-slider-wrapper">

    <!-- SCROLL -->
    <div
      class="hero-slider"
      #slider>

      @for (project of projects; track project.title) {

        <div class="hero-slide">

          <app-hero-project-card
            [project]="project">
          </app-hero-project-card>

        </div>

      }

    </div>

  </div>

</div>
