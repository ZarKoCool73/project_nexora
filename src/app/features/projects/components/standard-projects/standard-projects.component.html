<div
  class="standard-projects"
  *ngIf="projects.length">

  <!-- HEADER -->
  <div class="standard-header">

    <div>

      <div class="standard-kicker">
        Sistemas Productivos
      </div>

      <h3 class="standard-title">
        Proyectos de Ingeniería
      </h3>

    </div>

    <div class="standard-actions">

      <button
        class="standard-nav-btn"
        (click)="scrollLeft()">

        ←

      </button>

      <button
        class="standard-nav-btn"
        (click)="scrollRight()">

        →

      </button>

    </div>

  </div>

  <!-- DESCRIPTION -->
  <p class="standard-description">
    Plataformas empresariales, sistemas administrativos,
    automatización de procesos y soluciones escalables.
  </p>

  <!-- WRAPPER -->
  <div class="standard-slider-wrapper">

    <div
      class="standard-grid"
      #slider>

      @for (project of projects; track project.title) {

        <div class="standard-slide">

          <app-standard-project-card
            [project]="project">
          </app-standard-project-card>

        </div>

      }

    </div>

  </div>

</div>
