<div class="stats-bar" reveal>

  @for (stat of stats; track stat.label) {
    <div class="stat-item" (click)="goToRoute(stat.url)">

      <div class="stat-number">
        {{ stat.value }}<span>+</span>
      </div>

      <div class="stat-label">
        {{ stat.label }}
      </div>

    </div>
  }

</div>
