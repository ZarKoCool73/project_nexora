<section id="skills" style="margin-top: 2rem;" reveal>

  <div class="section-header">
    <span class="section-num">01</span>
    <h2 class="section-title">Stack técnico</h2>
    <div class="section-line"></div>
  </div>

  <div class="skills-controls">

    <input
      type="text"
      placeholder="Buscar tecnología..."
      [(ngModel)]="searchTerm"
      class="search-input"
    />

    <div class="filters">
      @for (cat of categories; track cat) {
        <button
          (mouseenter)="setCategory(cat)"
          [class.active]="selectedCategory === cat">
          {{ cat }}
        </button>
      }
    </div>

  </div>

  <div class="skills-grid">

    @for (tech of paginatedTechs; track tech.name) {
      <div
        class="tech-card"
        (mouseenter)="hoverTech(tech)"
        (mouseleave)="leaveTech()"
        [class.active]="hoveredTech?.name === tech.name"
      >

        <div class="tech-header">
          <span class="tech-icon">{{ tech.icon }}</span>

          <div class="tech-info">
            <div class="tech-name">{{ tech.name }}</div>
            <div class="tech-meta">
              {{ tech.category }} · {{ tech.years }} años
            </div>
          </div>

          <span class="tech-level">{{ tech.level }}%</span>
        </div>

        <div class="tech-bar">
          <div
            class="tech-fill"
            [style.width.%]="tech.level">
          </div>
        </div>

        <!-- 🔥 OVERLAY SOLO EN HOVER -->
        @if (hoveredTech?.name === tech.name) {
          <div class="tech-hover-panel">
            <span class="hover-label">Experiencia</span>
            <span class="hover-years">{{ tech.years }} años</span>
          </div>
        }

      </div>
    }
  </div>
</section>
<app-pagination
  [currentPage]="currentPage"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)">
</app-pagination>
