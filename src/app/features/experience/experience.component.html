<section id="experience" reveal>

  <div class="section-header">
    <h2 class="section-title">Experiencia</h2>
    <span class="experience-badge">{{ totalExperience }}</span>
    <div class="section-line"></div>
  </div>

  <div class="timeline">

    @for (exp of experiences; track exp.period) {

      <div class="timeline-item">

        <div class="timeline-period">
          {{ exp.period }}
        </div>

        <div class="timeline-content" (click)="goToExp(exp.idExperience)">
          <div class="timeline-role">{{ exp.role }}</div>
          <div class="timeline-company">

            @if (exp.logo) {
              <img
                [src]="exp.logo"
                [alt]="exp.company"
                class="company-logo"
              />
            }

            <span>{{ exp.company }}</span>

          </div>
          <div class="timeline-desc">
            {{
              exp.description.length > 250
                ? (exp.description | slice:0:(exp.description | slice:0:250).lastIndexOf(' ')) + '...'
                : exp.description
            }}
          </div>
        </div>

      </div>

    }

  </div>

</section>
