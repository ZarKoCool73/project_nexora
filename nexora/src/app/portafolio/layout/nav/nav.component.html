<!-- src/app/layout/nav/nav.component.html -->
<nav [class.scrolled]="scrolled()">

  <!-- Logo -->
  <a href="#home" class="nav-logo">DG.dev</a>

  <!-- Links centrados -->
  <ul class="nav-links">
    @for (link of links; track link.href) {
      <li>
        <a [href]="link.href" class="nav-link">{{ link.label }}</a>
      </li>
    }
  </ul>

  <!-- Controles derecha -->
  <div class="nav-right">

    <!-- Theme toggle -->
    <div class="theme-wrap">
      <span class="theme-lbl">
        {{ theme.current() === 'dark' ? 'Oscuro' : 'Claro' }}
      </span>
      <button
        class="theme-toggle"
        [class.is-light]="theme.current() === 'light'"
        (click)="theme.toggle()"
        [attr.aria-label]="'Cambiar a modo ' + (theme.isDark ? 'claro' : 'oscuro')"
      ></button>
    </div>

    <!-- Indicador disponible -->
    <div class="nav-available">
      <span class="available-dot"></span>
      Disponible
    </div>

  </div>
</nav>
