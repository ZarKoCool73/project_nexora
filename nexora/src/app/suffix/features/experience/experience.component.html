<!-- src/app/features/experience/experience.component.html -->
<section class="section section--alt" id="experience">

  <app-section-header num="03" title="Experiencia" />

  <div class="timeline">
    @for (job of data.jobs(); track job.company; let i = $index) {
      <div class="timeline-row">

        <!-- Periodo -->
        <div class="tl-time" appScrollReveal [rvDelay]="i * 60">
          {{ job.period }}
        </div>

        <!-- Contenido -->
        <div class="tl-body" appScrollReveal [rvDelay]="i * 60 + 40">
          <h3 class="tl-role">{{ job.role }}</h3>
          <p class="tl-company">// {{ job.company }}</p>
          <p class="tl-desc">{{ job.description }}</p>

          @if (job.tags?.length) {
            <div class="tl-tags">
              @for (tag of job.tags; track tag) {
                <app-chip [label]="tag" />
              }
            </div>
          }
        </div>

      </div>
    }
  </div>

</section>
