<!-- src/app/features/skills/skills.component.html -->
<section class="section section--alt" id="skills">

  <app-section-header num="01" title="Stack técnico" />

  <div class="skills-grid">
    @for (skill of data.skills(); track skill.name; let i = $index) {
      <div class="skill-card" appScrollReveal [rvDelay]="i * 70">
        <span class="sk-icon">{{ skill.icon }}</span>
        <h3 class="sk-name">{{ skill.name }}</h3>
        <p class="sk-tags">{{ skill.tags.join(' · ') }}</p>
        <div class="sk-bar">
          <div class="sk-fill" [attr.data-w]="skill.level"></div>
        </div>
        <span class="sk-level">{{ skill.level }}%</span>
      </div>
    }
  </div>

</section>
