<!-- src/app/features/projects/projects.component.html -->
<section class="section" id="projects">

  <app-section-header num="02" title="Proyectos destacados" />

  <div class="projects-grid">
    @for (p of data.projects(); track p.id; let i = $index) {
      <article
        class="project-card"
        [class]="gridClass(p.size)"
        appScrollReveal
        [rvDelay]="i * 80"
      >
        <!-- Cabecera -->
        <div class="card-top">
          <div class="card-chips">
            @for (chip of p.chips; track chip) {
              <app-chip [label]="chip" />
            }
          </div>
          <span class="card-year">{{ p.year }}</span>
        </div>

        <!-- Contenido -->
        <h3 class="card-title">{{ p.title }}</h3>
        <p class="card-desc">{{ p.description }}</p>

        <!-- Footer -->
        <div class="card-footer">
          <span class="card-stack">{{ p.stack }}</span>
          <div class="card-links">
            @if (p.repoUrl) {
              <a [href]="p.repoUrl" target="_blank" class="card-link" aria-label="Repositorio">⌥</a>
            }
            <a [href]="p.url || '#'" target="_blank" class="card-link card-link--main" aria-label="Ver proyecto">↗</a>
          </div>
        </div>

        <!-- Highlight badge -->
        @if (p.highlight) {
          <span class="card-badge">Destacado</span>
        }
      </article>
    }
  </div>

</section>
