<section id="credentials" reveal>

  <div class="section-header">
    <span class="section-num">04</span>
    <h2 class="section-title">Credenciales</h2>
    <div class="section-line"></div>
  </div>

  <div class="credentials-grid">

    @for (cert of credentials; track cert.title) {

      <div class="credential-card">

        <div class="cred-header">
          <div class="cred-title">{{ cert.title }}</div>
          <div class="cred-type">{{ cert.type }}</div>
        </div>

        <div class="cred-issuer">
          {{ cert.issuer }}
        </div>

        <div class="cred-meta">
          <span>{{ cert.date }}</span>
          @if (cert.status) {
            <span class="cred-status">{{ cert.status }}</span>
          }
        </div>

        @if (cert.description) {
          <p class="cred-desc">
            {{ cert.description }}
          </p>
        }

      </div>

    }

  </div>

</section>
